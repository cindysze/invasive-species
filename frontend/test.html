<!DOCTYPE html>
<html>
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <title>Weed Out!</title>

  

  <style>

    .scan-container {
    position: relative;
    width: 300px;
    margin: auto;
    }

    .scan-container img {
    width: 100%;
    border-radius: 12px;
    }

    /* 🌿 green scanning line */
    .scan-line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 3px;

    background: #8FFFBE;
    box-shadow: 0 0 10px #8FFFBE;

    animation: scan 2s linear infinite;
    }

    /* animation: top → bottom → repeat */
    @keyframes scan {
    0% { top: 0%; }
    100% { top: 100%; }
    }

    .navbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    
    padding: 10px 20px;
    border-radius: 999px;
    
    display: flex;
    gap: 20px;
    z-index: 3;
    }

    .navbar span {
    cursor: pointer;
    color: white;
    opacity: 0.7;
    transition: 0.2s;
    }

    .navbar span:hover {
    opacity: 1;
    }

    .cursor {
    display: inline-block;
    margin-left: 5px;
    animation: blink 1s infinite;
    }

    .loader-circle {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #8FFFBE;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
    }

    @keyframes spin {
    100% { transform: rotate(360deg); }
    }

    @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
    }
    /* =========================
       🌿 FULL GRID BACKGROUND
       ========================= */
    .grid {
      position: fixed;
      inset: 0;

      display: grid;
      grid-template-columns: repeat(3, 1fr); /* fewer columns */
      grid-auto-rows: 1fr; /* fills screen evenly */

      height: 100vh;
      width: 100vw;

      z-index: 0;
    }

    .grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* =========================
       🌑 LIGHT OVERLAY (NOT TOO DARK)
       ========================= */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35); /* lighter */
      z-index: 1;
    }

    /* =========================
       🌿 MAIN UI
       ========================= */
    body {


    /* MAY DELETE */

    /* MAY DELETE */

    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;

    color: white;

    /* 🌿 YOUR IMAGE BACKGROUND */
    background: url("imgs/test_background.png");
    background-size: cover;
    background-position: center;
}

    .card {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {



      font-size: 70px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    
    p {
      color: #eee;
      margin-bottom: 30px;
    }

    .upload-box {
      border: 2px dashed rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 25px;
      width: 320px;
      margin: auto;
      cursor: pointer;
      transition: 0.2s;
      background: rgba(0,0,0,0.25);
    }

    .upload-box:hover {
      border-color: #00e676;
      background: rgba(0,255,150,0.15);
    }

    img.preview {
      margin-top: 20px;
      max-width: 200px;
      border-radius: 10px;
    }

    .result {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      width: min(720px, 90vw);
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 380px;
      overflow-y: auto;
      font-size: 13px;
    }

    .loading {
      opacity: 0.8;
      font-style: italic;
    }

    .err {
      background: rgba(255, 40, 40, 0.20);
      border-color: rgba(255, 120, 120, 0.40);
    }
  </style>
</head>

<body class="font-sans">
      <div class="navbar">
    <span onclick="showPage('upload')">Upload</span>
    <span onclick="showPage('explore')">Explore</span>
    <span onclick="showPage('about')">About</span>
    </div>

  <!-- 🌿 BACKGROUND GRID -->

  <!-- 🌑 LIGHT OVERLAY -->
  <div class="overlay"></div>

  <!-- 🌿 MAIN UI -->
  <div id="upload" class="page card">
    <h1 class="text-7xl font-light tracking-wide font-sans text-white">
    weed <span id="typed-text"></span>
    <span id="cursor" class="text-accent-success animate-pulse">|</span>
    </h1>
    <p>ai-powered invasive species detection</p>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      Drag & drop or click to upload
    </div>

    <input type="file" id="fileInput" style="display:none" onchange="handleUpload(event)" />

    <div id="preview"></div>
    <div id="result" class="result"></div>
  </div>

  <div id="explore" class="page" style="display:none;">
  <h1>Explore</h1>
  <p>Coming soon...</p>
</div>

<div id="about" class="page" style="display:none;">
  <h1>About</h1>
  <p>This project helps identify invasive species.</p>
</div>

<div id="loading" class="page" style="display:none;">
  <div class="scan-container">
    <img id="scan-image" />
    <div class="scan-line"></div>
  </div>
  <p>Analyzing plant...</p>
</div>

<div id="resultPage" class="page" style="display:none;">
  <h1>Result</h1>
  <div id="final-result"></div>
</div>

  <script>

    function showPage(pageId) {
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");
    document.getElementById(pageId).style.display = "block";
    }
    const API_BASE = window.INAT_API_BASE || "http://127.0.0.1:8000";

    async function handleUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const imageURL = URL.createObjectURL(file);

      // show loading page
      showPage("loading");

      // set image inside scanner
      document.getElementById("scan-image").src = imageURL;

      const img = document.createElement("img");
      img.src = imageURL;
      img.className = "preview";

      const preview = document.getElementById("preview");
      preview.innerHTML = "";
      preview.appendChild(img);

      const result = document.getElementById("result");
      result.classList.remove("err");
      result.classList.add("loading");
      result.innerText = "Analyzing…";

      const fd = new FormData();
      fd.append("file", file, file.name);

      try {
        const res = await fetch(`${API_BASE}/api/identify`, {
          method: "POST",
          body: fd,
        });
        const data = await res.json();
        result.classList.remove("loading");

        if (!data.ok) {
          result.classList.add("err");
          result.innerText = data.error || "Request failed.";
        } else {
          // backend returns a ready-to-display markdown string
          result.innerText = data.markdown || JSON.stringify(data, null, 2);
        }
      } catch (e) {
        result.classList.remove("loading");
        result.classList.add("err");
        result.innerText =
          "Could not reach API at " + API_BASE +
          ". Start it with: uvicorn backend.main:app --reload\n\n" +
          String(e);
      }

      showPage("resultPage");
      document.getElementById("final-result").innerText = result.innerText;
      URL.revokeObjectURL(imageURL);
    }

    

    const text = "out!";
    let index = 0;

    function typeEffect() {
    if (index < text.length) {
        document.getElementById("typed-text").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 80);
    } else {
        // 👇 remove cursor when done
        document.getElementById("cursor").style.display = "none";
    }
    }

    window.addEventListener("load", () => {
    setTimeout(typeEffect, 1500); // after loader
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Weed Out!</title>
    <style>
        #loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    }

    /* floating shape */
    .cube {
    width: 60px;
    height: 60px;
    background: linear-gradient(145deg, #aaa, #444);
    transform-style: preserve-3d;
    animation: float 2s ease-in-out infinite;
    }

/* animation */
@keyframes float {
  0% {
    transform: rotateX(20deg) rotateY(0deg) translateY(0px);
    opacity: 0.6;
  }
  50% {
    transform: rotateX(20deg) rotateY(180deg) translateY(-20px);
    opacity: 1;
  }
  100% {
    transform: rotateX(20deg) rotateY(360deg) translateY(0px);
    opacity: 0.6;
  }
}

    body {
        

      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #f5f5f5);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    .upload-box {
      border: 2px dashed #bbb;
      border-radius: 15px;
      padding: 25px;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-box:hover {
      border-color: #4caf50;
      background: #f1f8f4;
    }

    img {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 10px;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f1f8f4;
      text-align: left;
      font-weight: normal;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 420px;
      overflow-y: auto;
    }

    .loading {
      color: #999;
      font-style: italic;
    }

    .err {
      background: #ffebee;
      color: #c62828;
    }
  </style>
</head>

<body>

    <div id="loader">
    <div class="cube"></div>
    </div>

  <div class="card">
    <h1>🌿 Weed Out!</h1>
    <p>Upload a photo to identify invasive species</p>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      Click or drag an image here
    </div>

    <input type="file" id="fileInput" style="display:none" onchange="handleUpload(event)" />

    <div id="preview"></div>
    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    // Same origin: open index.html via a static server (e.g. python -m http.server in frontend/)
    // and set API base to your FastAPI URL.
    const API_BASE = window.INAT_API_BASE || "http://127.0.0.1:8000";

    async function handleUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);

      const preview = document.getElementById("preview");
      preview.innerHTML = "";
      preview.appendChild(img);

      const result = document.getElementById("result");
      result.style.display = "block";
      result.classList.remove("err");
      result.classList.add("loading");
      result.innerText = "Analyzing…";

      const fd = new FormData();
      fd.append("file", file, file.name);

      try {
        const res = await fetch(`${API_BASE}/api/identify`, {
          method: "POST",
          body: fd,
        });
        const data = await res.json();
        result.classList.remove("loading");

        if (!data.ok) {
          result.classList.add("err");
          result.innerText = data.error || "Request failed.";
          return;
        }

        // Same markdown string as Gradio (includes invasive notes + footers).
        if (data.markdown) {
          result.innerText = data.markdown;
          return;
        }

        let text = "";
        (data.suggestions || []).forEach((s, i) => {
          const name = s.common_name || s.scientific_name || "Unknown";
          const sci = s.scientific_name || "";
          text += `${i + 1}. ${name} (${sci})\n`;
          text += "   " + (s.invasive_summary || "") + "\n\n";
        });
        if (data.llm_summary) text += "\n---\n" + data.llm_summary;
        result.innerText = text.trim() || JSON.stringify(data, null, 2);
      } catch (e) {
        result.classList.remove("loading");
        result.classList.add("err");
        result.innerText =
          "Could not reach API at " +
          API_BASE +
          ". Start the backend: uvicorn backend.main:app --reload\n" +
          String(e);
      }
    }
  </script>

  <script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loader");

  setTimeout(() => {
    loader.style.opacity = "0";
    loader.style.transition = "opacity 0.5s ease";

    setTimeout(() => {
      loader.style.display = "none";
    }, 500);
  }, 1500); // controls how long it shows
});
</script>

</body>
</html>
